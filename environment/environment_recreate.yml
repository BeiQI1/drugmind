name: drugtoolagent
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  # Core Chemistry & Biology Tools (Best installed via Conda to handle C++ deps)
  - rdkit
  - mgltools
  - openbabel
  - ambertools
  - pdb2pqr
  - vina
  
  # System Libraries for Graphics/PDF (Critical for WeasyPrint/RDKit)
  - cairo=1.16.0  # Pinned for stability
  - pixman=0.40.0 # Pinned for compatibility
  - pango
  - gdk-pixbuf
  - libffi
  - glib
  
  # Scientific Computing Stack
  - numpy
  - pandas
  - scipy
  - matplotlib
  - scikit-learn
  
  # General Utilities
  - ipykernel
  - jupyter
  - pip

  # Pip packages (Everything else)
  - pip:
    # PyTorch Ecosystem (Explicitly specify CUDA 12.1 index)
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.3.1
    - torchvision==0.18.1
    - torchaudio==2.3.1
    - torch-geometric
    - torch-scatter
    - torch-sparse
    - torch-cluster
    - torch-spline-conv
    - pytorch-lightning
    - torchmetrics
    
    # NLP & LLM
    - transformers
    - datasets
    - huggingface-hub
    - langchain
    - langchain-community
    - langchain-core
    - langchain-openai
    - langchain-experimental
    - openai
    - tiktoken
    
    # Web & App
    - streamlit
    - weasyprint
    - beautifulsoup4
    - requests
    - pyyaml
    - pillow
    - tqdm
    - pydantic
    - python-dotenv
    - fsspec
